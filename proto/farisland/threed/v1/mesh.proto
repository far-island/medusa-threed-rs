// Mesh generation service — surface reconstruction from point clouds.
//
// Two algorithms are available:
//   1. Delaunay triangulation (Bowyer-Watson) — general-purpose, slower.
//   2. Grid meshing — optimised for 2.5D laser scanner data, much faster.
//
// Both accept a point cloud and return a triangle mesh suitable for
// rendering.  The client converts MeshData to its native mesh format
// (e.g. JavaFX TriangleMesh, or GPU buffers in a future UI).
//
// Replaces: Delaunator.java, GridMesher.java, PCDViewer.toMesh()

syntax = "proto3";

package farisland.threed.v1;

option java_package = "com.farisland.grpc.threed.v1";
option java_multiple_files = true;

import "farisland/threed/v1/point_cloud_types.proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service MeshService {
  // Delaunay triangulation (Bowyer-Watson algorithm).
  // Operates on the 2D XY projection of the point cloud — Z values are
  // preserved in the output vertices but do not affect triangulation.
  // Suitable for general point sets.
  rpc Triangulate(TriangulateRequest) returns (TriangulateResponse);

  // Grid-based surface meshing.
  // Projects points onto a regular XY grid, averages Z per cell,
  // then connects adjacent occupied cells with triangles.
  // Much faster and more robust than Delaunay for 2.5D scanner data.
  rpc GridMesh(GridMeshRequest) returns (GridMeshResponse);

  // Export a MeshData payload to a file on disk in one of the supported
  // serialization formats (STL, OBJ, PLY). The server writes to
  // `output_path` using its local filesystem — the caller is responsible
  // for choosing a path the server process can write to. This mirrors the
  // existing ExportPTX pattern on PointCloudService (write-in-place,
  // success boolean + error string, no blob transport back to the client).
  //
  // Fallback scope (2026-04-24 DRAFT): STL binary is the MVP format; OBJ
  // + PLY are marked in MeshExportFormat but the server MAY return
  // Unimplemented for them until ai / modules land the encoders. Clients
  // should check `response.success` + `response.format_used` before
  // assuming parity across formats.
  rpc ExportMesh(ExportMeshRequest) returns (ExportMeshResponse);
}

// ---------------------------------------------------------------------------
// Messages — Triangulate (Delaunay)
// ---------------------------------------------------------------------------

message TriangulateRequest {
  // Input point cloud.
  PointCloudChunk points = 1;
}

message TriangulateResponse {
  // Resulting triangle mesh.
  MeshData mesh = 1;

  // Number of triangles generated.
  int32 triangle_count = 2;

  // Number of unique vertices in the mesh.
  int32 vertex_count = 3;
}

// ---------------------------------------------------------------------------
// Messages — GridMesh
// ---------------------------------------------------------------------------

message GridMeshRequest {
  // Input point cloud.
  PointCloudChunk points = 1;

  // Grid cell size in the same units as point coordinates (typically mm).
  // Smaller values produce more detailed meshes but take longer.
  double grid_step = 2;

  // Maximum gap to bridge between occupied cells, in grid units.
  // E.g. max_gap=2 means triangles can span 1 empty cell.
  // Higher values fill holes but may create artifacts.
  int32 max_gap = 3;
}

message GridMeshResponse {
  // Resulting triangle mesh.
  MeshData mesh = 1;

  // Grid dimensions used.
  int32 grid_cols = 2;
  int32 grid_rows = 3;

  // Number of triangles generated.
  int32 triangle_count = 4;

  // Number of unique vertices in the mesh.
  int32 vertex_count = 5;
}

// ---------------------------------------------------------------------------
// Messages — ExportMesh (2026-04-24 fallback DRAFT)
// ---------------------------------------------------------------------------

// Serialization format the server writes to disk.
enum MeshExportFormat {
  MESH_EXPORT_FORMAT_UNSPECIFIED = 0;
  // Binary STL — MVP. Widely supported, no color/uv, per-triangle
  // normals. Binary format; ASCII STL not supported. Encoder owner:
  // medusa-ai (MVP).
  MESH_EXPORT_FORMAT_STL = 1;
  // Wavefront OBJ — text, supports uv coords (future-proof for
  // textured meshes). Encoder owner: TBD (fallback, MAY be Unimplemented).
  MESH_EXPORT_FORMAT_OBJ = 2;
  // Stanford PLY — binary or ASCII, supports vertex colors + normals.
  // Encoder owner: TBD (fallback, MAY be Unimplemented).
  MESH_EXPORT_FORMAT_PLY = 3;
}

message ExportMeshRequest {
  // Mesh to serialize. Must be non-empty. Server responds with
  // success=false and error_message="mesh is empty" when vertex_count == 0
  // or face_count == 0 — gRPC status stays OK (this service surfaces
  // per-call errors via the boolean, not via status codes, matching the
  // existing ExportPTX pattern on PointCloudService).
  MeshData mesh = 1;

  // Absolute path on the server's filesystem. Server overwrites existing
  // files — caller is responsible for preventing accidental overwrites.
  string output_path = 2;

  // Requested format. UNSPECIFIED defaults to STL (MVP).
  MeshExportFormat format = 3;
}

message ExportMeshResponse {
  // True iff the file was successfully written.
  bool success = 1;

  // Stable, small set of error categories so clients can map to
  // user-friendly strings:
  //   "output_path is empty"
  //   "mesh is empty"
  //   "format not implemented"   (OBJ/PLY fallback during MVP)
  //   "permission denied"
  //   "write failed"
  // Empty when success=true.
  string error_message = 2;

  // Number of bytes written. Zero when success=false.
  uint64 bytes_written = 3;

  // Format actually used (normally == request.format, but UNSPECIFIED
  // resolves to STL in the response for telemetry clarity).
  MeshExportFormat format_used = 4;
}
